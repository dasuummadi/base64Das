<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTool Pro | Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700&display=swap">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #7F56D9; /* Purple from reference */
            --primary-light: #F9F5FF;
            --bg-main: #F2F4F7;
            --sidebar-dark: #FFFFFF;
            --border: #EAECF0;
            --text-main: #101828;
            --text-dim: #667085;
            --icon-sidebar-width: 80px;
            --nav-sidebar-width: 240px;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 1. Icon Sidebar (Leftmost) --- */
        .icon-sidebar {
            width: var(--icon-sidebar-width);
            background: #FFFFFF;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            z-index: 100;
        }

        .logo-box {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: white;
            font-size: 24px;
        }

        .icon-item {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .icon-item:hover { background: var(--primary-light); color: var(--primary); }
        .icon-item.active { background: var(--primary-light); color: var(--primary); }

        /* --- 2. Nav Sidebar (Operations) --- */
        .nav-sidebar {
            width: var(--nav-sidebar-width);
            background: #FFFFFF;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }

        .nav-sidebar h2 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 16px;
            padding-left: 12px;
        }

        .nav-group { margin-bottom: 24px; }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            color: #344054;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .nav-link i { margin-right: 12px; font-size: 18px; }

        .nav-link:hover { background: #F9FAFB; }
        .nav-link.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* --- 3. Main Content Area --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #FFFFFF;
        }

        header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
        }

        header h1 { margin: 0; font-size: 30px; font-weight: 600; }
        header p { color: var(--text-dim); margin: 8px 0 0 0; }

        .content-body {
            padding: 40px;
            max-width: 1000px;
        }

        /* --- UI Components --- */
        .card {
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0px 1px 3px rgba(16, 24, 40, 0.1);
        }

        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; }

        textarea, input {
            width: 100%;
            border: 1px solid #D0D5DD;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 20px;
            box-shadow: 0px 1px 2px rgba(16, 24, 40, 0.05);
        }

        textarea:focus { border-color: var(--primary); outline: none; ring: 4px var(--primary-light); }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0px 1px 2px rgba(16, 24, 40, 0.05);
        }

        .btn-primary:hover { background: #6941C6; }

        .result-box {
            background: #F9FAFB;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Monaco', monospace;
            font-size: 13px;
            color: #475467;
            min-height: 100px;
            white-space: pre-wrap;
            margin-top: 10px;
        }

        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="icon-sidebar">
        <div class="logo-box"><i class="ph-fill ph-cube"></i></div>
        <div class="icon-item active"><i class="ph ph-layout"></i></div>
        <div class="icon-item"><i class="ph ph-folder-simple"></i></div>
        <div class="icon-item"><i class="ph ph-chart-pie-slice"></i></div>
        <div class="icon-item"><i class="ph ph-users"></i></div>
        <div class="icon-item" style="margin-top: auto;"><i class="ph ph-gear"></i></div>
    </aside>

    <aside class="nav-sidebar">
        <h2>Operations</h2>
        <div class="nav-group">
            <div class="nav-link active" onclick="switchTab('text', this)">
                <i class="ph ph-text-aa"></i> Base64 Text
            </div>
            <div class="nav-link" onclick="switchTab('image', this)">
                <i class="ph ph-image"></i> Image to Base64
            </div>
            <div class="nav-link" onclick="switchTab('pdf', this)">
                <i class="ph ph-file-pdf"></i> PDF Converter
            </div>
            <div class="nav-link" onclick="switchTab('json', this)">
                <i class="ph ph-code"></i> JSON Beautifier
            </div>
            <div class="nav-link" onclick="switchTab('crypto', this)">
                <i class="ph ph-lock"></i> AES Crypto
            </div>
        </div>

        <h2 style="margin-top: 20px;">Utilities</h2>
        <div class="nav-group">
            <div class="nav-link" onclick="switchTab('zip', this)">
                <i class="ph ph-file-zip"></i> Zip Explorer
            </div>
            <div class="nav-link" onclick="switchTab('jwt', this)">
                <i class="ph ph-identification-badge"></i> JWT Studio
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="page-title">Base64 Text</h1>
            <p id="page-desc">Encode and decode text strings to Base64 format securely.</p>
        </header>

        <div class="content-body">
            <div id="text-section" class="section active">
                <div class="card">
                    <label>Input Text</label>
                    <textarea id="text-input" rows="4" placeholder="Enter text here..."></textarea>
                    
                    <div style="display: flex; gap: 12px; margin-bottom: 24px;">
                        <button class="btn-primary" onclick="processText('encode')">Encode</button>
                        <button class="btn-primary" style="background: white; color: #344054; border-color: #D0D5DD;" onclick="processText('decode')">Decode</button>
                    </div>

                    <label>Output Result</label>
                    <div id="text-result" class="result-box">Waiting for input...</div>
                </div>
            </div>

            <div id="image-section" class="section">
                <div class="card">
                    <label>Select Image</label>
                    <input type="file" id="image-input" accept="image/*">
                    <button class="btn-primary" onclick="encodeImage()">Generate Base64</button>
                    
                    <label style="margin-top: 24px;">Base64 String</label>
                    <textarea id="image-result-string" rows="6" readonly></textarea>
                </div>
            </div>

            <div id="json-section" class="section">
                <div class="card">
                    <label>Paste JSON</label>
                    <textarea id="json-input" rows="10" placeholder='{"key": "value"}'></textarea>
                    <button class="btn-primary" onclick="beautifyJSON()">Beautify JSON</button>
                    
                    <label style="margin-top: 24px;">Formatted Output</label>
                    <div id="json-result" class="result-box"></div>
                </div>
            </div>

            </div>
    </main>

    <script>
        function switchTab(tabId, element) {
            // Update Active Link
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');

            // Update Header
            const title = element.innerText.trim();
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-desc').innerText = `Manage your ${title} operations with ease.`;

            // Switch Visibility
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(tabId + '-section');
            if(target) target.classList.add('active');
        }

        // --- Core Logic ---
        function processText(mode) {
            const input = document.getElementById('text-input').value;
            const output = document.getElementById('text-result');
            try {
                if(mode === 'encode') output.innerText = btoa(input);
                else output.innerText = atob(input);
            } catch(e) {
                output.innerText = "Error: Invalid format for operation.";
            }
        }

        function beautifyJSON() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('json-result');
            try {
                const obj = JSON.parse(input);
                output.innerText = JSON.stringify(obj, null, 4);
            } catch(e) {
                output.innerText = "Error: Invalid JSON string.";
            }
        }

        function encodeImage() {
            const file = document.getElementById('image-input').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('image-result-string').value = e.target.result.split(',')[1];
                };
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
