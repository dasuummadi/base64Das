<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevTool Pro | Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700&display=swap">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #7F56D9;
            --primary-light: #F9F5FF;
            --bg-main: #F9FAFB;
            --sidebar-bg: #FFFFFF;
            --border: #EAECF0;
            --text-main: #101828;
            --text-dim: #667085;
            --icon-sidebar-width: 80px;
            --nav-sidebar-width: 260px;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar 1: Global Icons --- */
        .icon-sidebar {
            width: var(--icon-sidebar-width);
            background: #FFFFFF;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            z-index: 100;
        }

        .logo-box {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: white;
            font-size: 24px;
        }

        .icon-item {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .icon-item:hover, .icon-item.active { background: var(--primary-light); color: var(--primary); }

        /* --- Sidebar 2: Operations List --- */
        .nav-sidebar {
            width: var(--nav-sidebar-width);
            background: #FFFFFF;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            overflow-y: auto;
        }

        .nav-sidebar h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin: 20px 0 12px 12px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            color: #344054;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-link i { margin-right: 12px; font-size: 20px; }
        .nav-link:hover { background: #F9FAFB; }
        .nav-link.active { background: var(--primary-light); color: var(--primary); }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #FFFFFF;
            overflow-y: auto;
        }

        header {
            padding: 32px 40px;
            border-bottom: 1px solid var(--border);
        }

        header h1 { margin: 0; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
        header p { color: var(--text-dim); margin-top: 8px; font-size: 15px; }

        .content-body { padding: 40px; max-width: 1100px; }

        /* --- UI Components --- */
        .card {
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 1px 3px rgba(16,24,40,0.1);
            margin-bottom: 24px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: #344054; }

        textarea, input {
            width: 100%;
            border: 1px solid #D0D5DD;
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            margin-bottom: 16px;
        }

        textarea:focus, input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px #F4EBFF; }

        button {
            background: var(--primary);
            color: white;
            border: 1px solid var(--primary);
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 8px;
        }

        button:hover { background: #6941C6; }

        .result-box {
            background: #F9FAFB;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            font-family: 'JetBrains Mono', 'Monaco', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            min-height: 80px;
            color: #475467;
        }

        .section { display: none; animation: fadeIn 0.2s ease-out; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside class="icon-sidebar">
        <div class="logo-box"><i class="ph-fill ph-terminal-window"></i></div>
        <div class="icon-item active" title="Tools"><i class="ph ph-squares-four"></i></div>
        <div class="icon-item" title="Files"><i class="ph ph-folder"></i></div>
        <div class="icon-item" title="Analytics"><i class="ph ph-chart-bar"></i></div>
        <div class="icon-item" style="margin-top: auto;"><i class="ph ph-user-circle"></i></div>
    </aside>

    <aside class="nav-sidebar">
        <h2>Encoding & Crypto</h2>
        <div class="nav-link active" onclick="switchTab('text', this)"><i class="ph ph-text-t"></i> Base64 Text</div>
        <div class="nav-link" onclick="switchTab('image', this)"><i class="ph ph-image"></i> Base64 Image</div>
        <div class="nav-link" onclick="switchTab('pdf', this)"><i class="ph ph-file-pdf"></i> Base64 PDF</div>
        <div class="nav-link" onclick="switchTab('crypto', this)"><i class="ph ph-lock-key"></i> AES Encryption</div>
        
        <h2>Developer Utils</h2>
        <div class="nav-link" onclick="switchTab('json', this)"><i class="ph ph-code"></i> JSON Beautifier</div>
        <div class="nav-link" onclick="switchTab('jwt', this)"><i class="ph ph-fingerprint"></i> JWT Studio</div>
        <div class="nav-link" onclick="switchTab('zip', this)"><i class="ph ph-file-zip"></i> Zip Converter</div>
        <div class="nav-link" onclick="switchTab('xml', this)"><i class="ph ph-file-code"></i> XML Tools</div>
    </aside>

    <main class="main-content">
        <header>
            <h1 id="page-title">Base64 Text</h1>
            <p id="page-desc">Easily encode and decode text strings between UTF-8 and Base64.</p>
        </header>

        <div class="content-body">
            
            <div id="text-section" class="section active">
                <div class="card">
                    <label>Input Text</label>
                    <textarea id="text-input" rows="5" placeholder="Paste your text here..."></textarea>
                    <div style="margin-bottom: 20px;">
                        <button onclick="runText('encode')">Encode</button>
                        <button style="background:white; color:#344054; border-color:#D0D5DD;" onclick="runText('decode')">Decode</button>
                    </div>
                    <label>Output</label>
                    <div id="text-output" class="result-box">Result will appear here...</div>
                </div>
            </div>

            <div id="image-section" class="section">
                <div class="card">
                    <label>Upload Image</label>
                    <input type="file" id="image-file" accept="image/*">
                    <button onclick="runImage()">Convert to Base64</button>
                    <textarea id="image-output" rows="8" style="margin-top:20px;" placeholder="Base64 string..." readonly></textarea>
                </div>
            </div>

            <div id="crypto-section" class="section">
                <div class="card">
                    <label>Message</label>
                    <textarea id="msg-input" rows="3"></textarea>
                    <label>Secret Key (32 Chars for AES-256)</label>
                    <input type="text" id="msg-key" placeholder="Enter key...">
                    <button onclick="runCrypto('enc')">Encrypt</button>
                    <button style="background:white; color:#344054; border-color:#D0D5DD;" onclick="runCrypto('dec')">Decrypt</button>
                    <div id="crypto-output" class="result-box" style="margin-top:20px;">Result...</div>
                </div>
            </div>

            <div id="json-section" class="section">
                <div class="card">
                    <label>JSON Input</label>
                    <textarea id="json-input" rows="10" placeholder='{"test": 123}'></textarea>
                    <button onclick="runJson()">Format & Beautify</button>
                    <div id="json-output" class="result-box" style="margin-top:20px;"></div>
                </div>
            </div>

            <div id="jwt-section" class="section">
                <div class="card">
                    <label>Credentials (username|id|license|pass)</label>
                    <input type="text" id="jwt-creds">
                    <button onclick="runJwt()">Generate JWT</button>
                    <div id="jwt-output" class="result-box" style="margin-top:20px;"></div>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.6.0/jszip.min.js"></script>

    <script>
        // --- Navigation Logic ---
        function switchTab(tabId, element) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            element.classList.add('active');

            const title = element.innerText.trim();
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-desc').innerText = `Professional ${title} management for software developers.`;

            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(tabId + '-section');
            if(target) target.classList.add('active');
        }

        // --- Operation Logic ---
        function runText(mode) {
            const input = document.getElementById('text-input').value;
            const output = document.getElementById('text-output');
            try {
                output.innerText = (mode === 'encode') ? btoa(input) : atob(input);
            } catch(e) { output.innerText = "Error: Check your input format."; }
        }

        function runImage() {
            const file = document.getElementById('image-file').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('image-output').value = e.target.result.split(',')[1]; };
                reader.readAsDataURL(file);
            }
        }

        function runCrypto(mode) {
            const msg = document.getElementById('msg-input').value;
            const key = document.getElementById('msg-key').value;
            const out = document.getElementById('crypto-output');
            if(key.length < 1) return alert("Enter a key");
            
            try {
                if(mode === 'enc') out.innerText = CryptoJS.AES.encrypt(msg, key).toString();
                else out.innerText = CryptoJS.AES.decrypt(msg, key).toString(CryptoJS.enc.Utf8) || "Invalid Key";
            } catch(e) { out.innerText = "Error in Cipher."; }
        }

        function runJson() {
            const input = document.getElementById('json-input').value;
            const output = document.getElementById('json-output');
            try {
                output.innerText = JSON.stringify(JSON.parse(input), null, 4);
            } catch(e) { output.innerText = "Invalid JSON structure."; }
        }

        function runJwt() {
            const creds = document.getElementById('jwt-creds').value;
            const header = btoa(JSON.stringify({alg:"HS256", typ:"JWT"}));
            const payload = btoa(JSON.stringify({sub: btoa(creds), iat: Date.now()}));
            document.getElementById('jwt-output').innerText = `${header}.${payload}.[signature]`;
        }
    </script>
</body>
</html>
